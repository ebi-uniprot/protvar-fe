include:
  - project: uniprot/variation/protvar-deploy
    ref: main
    file: /ci-templates/gitlab-ci-template.yml

variables:
  BE_API: "https://www.ebi.ac.uk/ProtVar/api"  # Default

stages:
  - build_static_assets
  - build_docker_image
  - deploy

# Remove workflow section completely

.js:
  image: dockerhub.ebi.ac.uk/uniprot/variation/protvar-deploy/cached/node-18.20
  before_script:
    - node --version
    - npm --version
    - yarn --version
    - yarn install

build_static_assets:
  only:
    refs: [main, dev, int]
  extends: .js
  stage: build_static_assets
  variables:
    BE_API: >-
      ${CI_COMMIT_BRANCH == "dev" ? "https://wwwdev.ebi.ac.uk/ProtVar/api" : 
       CI_COMMIT_BRANCH == "int" ? "https://wwwint.ebi.ac.uk/ProtVar/api" : 
       "https://www.ebi.ac.uk/ProtVar/api"}
  script:
    - echo "REACT_APP_GIT_BRANCH=${CI_COMMIT_BRANCH}" >> .env.local
    - echo "REACT_APP_API_BASE_URL=${BE_API}" >> .env.local
    - yarn build
  artifacts:
    paths:
      - build/

build_docker_image:
  only:
    refs: [main, dev, int]
  extends: .build_docker
  stage: build_docker_image

int-deploy:
  only:
    refs: [int]
  extends: .deploy
  stage: deploy
  script:
    - ./protvar-deploy/scripts/deploy.sh "int" "protvar-fe" "${CI_COMMIT_SHORT_SHA}"

dev-deploy:
  only:
    refs: [dev]
  extends: .deploy
  stage: deploy
  script:
    - ./protvar-deploy/scripts/deploy.sh "dev" "protvar-fe" "${CI_COMMIT_SHORT_SHA}"

main-deploy:
  only:
    refs: [main]
  extends: .deploy
  stage: deploy
  script:
    - ./protvar-deploy/scripts/deploy.sh "pub" "protvar-fe" "${CI_COMMIT_SHORT_SHA}"